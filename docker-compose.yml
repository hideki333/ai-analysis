services:

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./docker/php
    volumes:
      - .:/var/www/html
    environment:
      # Docker内部ではnginxサービス名でモックAPIにアクセスできる
      # mock-up用
      # AI_API_URL: http://nginx/api/mock/analyze
      # 本番API
      AI_API_URL: https://example.com/
      AI_USE_MOCK: "false"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret        # 開発用。本番では強いパスワードに変更すること
      MYSQL_ROOT_PASSWORD: secret   # 開発用。本番では強いパスワードに変更すること
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
